active_model = "mistral-medium-latest"
voice_mode_enabled = true

[[models]]
name = "mistral-medium-latest"
provider = "mistral"
alias = "mistral-medium-latest"

[[mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = ["@playwright/mcp@latest"]

[[mcp_servers]]
name = "fetch"
transport = "stdio"
command = "uvx"
args = ["mcp-server-fetch"]

[[mcp_servers]]
name = "sqlite"
transport = "stdio"
command = "uvx"
args = ["mcp-server-sqlite"]
